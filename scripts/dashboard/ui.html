<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>jidoka dashboard</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --border:#262b36; --text:#e6e9ef; --muted:#8b93a5;
          --green:#34d399; --amber:#fbbf24; --red:#f87171; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,system-ui,Segoe UI,sans-serif; }
  header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  h1 { font-size:15px; margin:0; }
  #projects { display:flex; gap:8px; flex-wrap:wrap; }
  .tab { padding:4px 12px; border:1px solid var(--border); border-radius:8px; cursor:pointer; color:var(--muted); font-size:13px; }
  .tab.active { color:var(--text); border-color:var(--amber); background:rgba(251,191,36,.1); }
  .live { font-size:11px; color:var(--muted); }
  .live.on { color:var(--green); }
  button { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:13px; }
  main { padding:20px; display:grid; gap:16px; grid-template-columns:1fr 1fr; max-width:1100px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; }
  .card h2 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 12px; }
  .funnel { display:flex; flex-direction:column; gap:4px; }
  .stage { padding:6px 10px; border-radius:6px; background:rgba(255,255,255,.03); font-size:12px; }
  .badge { display:inline-block; padding:3px 10px; border-radius:6px; font-size:12px; font-weight:700; }
  .badge.green { color:var(--green); background:rgba(52,211,153,.12); }
  .badge.amber { color:var(--amber); background:rgba(251,191,36,.12); }
  .badge.red { color:var(--red); background:rgba(248,113,113,.12); }
  .badge.unknown { color:var(--muted); background:rgba(139,147,165,.12); }
  .meta { font-size:12px; color:var(--muted); }
  .task { display:flex; gap:10px; padding:7px 0 7px 8px; border-bottom:1px solid var(--border); font-size:13px; }
  .task .src { font-size:10px; text-transform:uppercase; color:var(--muted); min-width:104px; }
  .p-critical { border-left:3px solid var(--red); }
  .p-high { border-left:3px solid var(--amber); }
  .p-medium { border-left:3px solid var(--muted); }
  .empty { color:var(--muted); font-size:13px; }
  .banner { grid-column:1/-1; padding:10px 14px; border-radius:10px; background:rgba(248,113,113,.12); color:var(--red); font-weight:600; }
  .notice { margin:20px; padding:18px 20px; border-radius:12px; background:rgba(251,191,36,.1); border:1px solid rgba(251,191,36,.3); color:var(--text); line-height:1.7; max-width:640px; }
  .notice code { background:rgba(255,255,255,.08); padding:2px 7px; border-radius:5px; font-size:13px; }
  .notice b { color:var(--amber); }
  .wave-head { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .tag { font-size:11px; padding:2px 9px; border-radius:20px; background:rgba(255,255,255,.06); color:var(--muted); white-space:nowrap; }
  .tag.live-tag { color:var(--green); background:rgba(52,211,153,.12); }
  .tag.cur-tag { color:var(--amber); background:rgba(251,191,36,.16); }
  .tag.halt-tag { color:var(--red); background:rgba(248,113,113,.14); }
  .pipeline { display:flex; flex-direction:column; }
  .flow { color:var(--border); margin-left:14px; font-size:14px; line-height:1; height:13px; }
  .stage { display:flex; gap:12px; align-items:flex-start; padding:11px 12px; border:1px solid var(--border); border-radius:10px; background:rgba(255,255,255,.02); }
  .stage.cur { border-color:var(--amber); background:rgba(251,191,36,.06); }
  .st-ico { width:22px; height:22px; min-width:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; margin-top:1px; }
  .st-done .st-ico { background:rgba(52,211,153,.16); color:var(--green); }
  .st-running .st-ico { background:rgba(251,191,36,.16); color:var(--amber); animation:pulse 1.4s ease-in-out infinite; }
  .st-failed .st-ico { background:rgba(248,113,113,.16); color:var(--red); }
  .st-pending .st-ico, .st-idle .st-ico { background:rgba(139,147,165,.12); color:var(--muted); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .st-main { flex:1; min-width:0; }
  .st-top { display:flex; gap:6px; align-items:center; flex-wrap:wrap; font-size:13px; }
  .chips { display:flex; gap:5px; flex-wrap:wrap; margin-top:7px; }
  .chip { font-size:11px; padding:2px 8px; border-radius:6px; background:rgba(255,255,255,.05); color:var(--text); }
  .chip.oc-violation, .chip.oc-fail, .chip.oc-block, .chip.oc-revise { background:rgba(248,113,113,.14); color:var(--red); }
  .chip.oc-pass, .chip.oc-approve, .chip.oc-done { background:rgba(52,211,153,.14); color:var(--green); }
  .gates { display:flex; gap:4px; flex-wrap:wrap; margin-top:7px; }
  .gate { font-size:10px; padding:1px 6px; border-radius:4px; background:rgba(96,165,250,.1); color:#93c5fd; font-family:ui-monospace,Menlo,monospace; }
  .st-note { font-size:12px; color:var(--muted); margin-top:6px; font-style:italic; }
  .st-stat { font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); min-width:54px; text-align:right; margin-top:3px; }
</style>
</head>
<body>
<header>
  <h1>🦞 jidoka dashboard</h1>
  <div id="projects"></div>
  <span class="live" id="live">○ idle</span>
  <button onclick="exportGdoc()" style="margin-left:auto">Export → GDoc</button>
</header>
<main id="main"><p class="empty" style="padding:20px">Загрузка…</p></main>

<script>
let current = null, es = null;

function notice(html) { document.getElementById('main').innerHTML = '<div class="notice">' + html + '</div>'; }
const SERVER_HINT = '⚠ <b>Дашборд не подключён к серверу.</b><br>Запусти <code>npm run dashboard</code> в папке jidoka, затем открой <b>http://localhost:7717</b>.<br><span style="color:var(--muted)">Сам файл <code>ui.html</code> (preview / file://) не работает — данные берутся у сервера.</span>';

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(path + ' → HTTP ' + r.status);
  return r.json();
}

async function loadProjects() {
  let ps;
  try { ps = await api('/api/projects'); }
  catch { notice(SERVER_HINT); return; }
  if (!ps.length) { notice('Проекты не найдены. Дашборд ищет <code>~/*/.jidoka</code> и <code>docs/governance/raci.json</code>.'); return; }
  const el = document.getElementById('projects');
  el.innerHTML = '';
  ps.forEach((p) => {
    const t = document.createElement('div');
    t.className = 'tab' + (p.name === current ? ' active' : '');
    t.textContent = p.name + (p.kind === 'framework' ? ' ⚙' : '');
    t.onclick = () => select(p.name);
    el.appendChild(t);
  });
  if (!current && ps.length) select(ps[0].name);
}

function select(name) {
  current = name;
  loadProjects();
  render();
  if (es) es.close();
  es = new EventSource('/api/stream?project=' + encodeURIComponent(name));
  es.onopen = () => { const l = document.getElementById('live'); l.textContent = '● live'; l.className = 'live on'; };
  es.addEventListener('update', render);
  es.onerror = () => { const l = document.getElementById('live'); l.textContent = '○ reconnecting'; l.className = 'live'; };
}

function esc(s) { return String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

async function render() {
  if (!current) return;
  let d;
  try { d = await api('/api/data?project=' + encodeURIComponent(current)); }
  catch { notice(SERVER_HINT); return; }
  const h = d.health;
  const banner = h.halt ? '<div class="banner">🔴 ANDON — pipeline halted, resume required</div>' : '';
  const P = d.pipeline;
  const ICON = { done: '✓', running: '▸', failed: '✗', pending: '○', idle: '◦' };
  const stageHtml = (s) => `
    <div class="stage st-${s.status}${s.current ? ' cur' : ''}">
      <div class="st-ico">${ICON[s.status] || '○'}</div>
      <div class="st-main">
        <div class="st-top"><b>${esc(s.label)}</b>${s.parallel ? '<span class="tag">∥ parallel</span>' : ''}${s.verifyN ? `<span class="tag">verify ×${s.verifyN}</span>` : ''}${s.current ? '<span class="tag cur-tag">● волна здесь</span>' : ''}</div>
        ${s.agents.length ? `<div class="chips">${s.agents.map((a) => `<span class="chip${a.outcome ? ' oc-' + esc(String(a.outcome).toLowerCase()) : ''}">${esc(a.name)}${a.outcome ? ' · ' + esc(a.outcome) : ''}</span>`).join('')}</div>` : ''}
        ${s.gates.length ? `<div class="gates">${s.gates.map((g) => `<span class="gate">${esc(g)}</span>`).join('')}</div>` : ''}
        ${s.note ? `<div class="st-note">“${esc(s.note)}”</div>` : ''}
      </div>
      <div class="st-stat">${esc(s.status)}</div>
    </div>`;
  const pipeBody = P.stages.length
    ? P.stages.map(stageHtml).join('<div class="flow">│</div>')
    : '<span class="empty">нет графа пайплана (планировщик недоступен и нет run-state)</span>';
  const waveTags = [
    P.wave ? `<span class="tag">волна: ${esc(P.wave)}</span>` : '',
    P.task ? `<span class="tag">${esc(P.task.risk || 'normal')}${(P.task.surfaces || []).length ? ' · ' + esc((P.task.surfaces || []).join('+')) : ''}</span>` : '',
    `<span class="tag ${P.live ? 'live-tag' : ''}">${P.live ? '● live wave' : 'canonical graph'}</span>`,
    `<span class="tag">${P.progress}% phases done</span>`,
    P.halted ? '<span class="tag halt-tag">🔴 ANDON halted</span>' : '',
  ].filter(Boolean).join('');
  const tasks = d.tasks.length
    ? d.tasks.map((t) => '<div class="task p-' + t.priority + '"><span class="src">' + esc(t.source) + '</span><span>' + esc(t.text) + '</span></div>').join('')
    : '<span class="empty">всё чисто</span>';
  document.getElementById('main').innerHTML = `
    ${banner}
    <div class="card" style="grid-column:1/-1">
      <h2>Dev-pipeline · ${esc(P.branch || '')}</h2>
      <div class="wave-head">${waveTags}</div>
      <div class="pipeline">${pipeBody}</div>
    </div>
    <div class="card">
      <h2>Health</h2>
      <span class="badge ${h.level}">${h.level.toUpperCase()}</span>
      <p class="meta">eval ${h.evalPct ?? '—'}% · recent fails ${h.recentFails} · ${h.halt ? 'HALTED' : 'running'}</p>
      <h2 style="margin-top:18px">Production pipeline</h2>
      <p class="meta">${d.production.deployCount} deploy event(s)</p>
      <p class="meta">updated ${new Date(d.collectedAt).toLocaleTimeString()}</p>
    </div>
    <div class="card" style="grid-column:1/-1">
      <h2>Что висит · ${d.tasks.length}</h2>
      ${tasks}
    </div>
    <div class="card">
      <h2>Лента действий агентов</h2>
      ${(d.activity || []).length ? d.activity.map((a) => '<div class="task"><span class="src">' + esc(a.agent) + '</span><span>' + esc(a.action) + '</span></div>').join('') : '<span class="empty">тихо</span>'}
    </div>
    <div class="card">
      <h2>Уроки мета-леджера · рецидив</h2>
      ${(d.lessons || []).length ? d.lessons.map((l) => '<div class="task"><span class="src">' + l.count + '×</span><span>' + esc(l.class) + '</span></div>').join('') : '<span class="empty">нет</span>'}
    </div>
    <div class="card" style="grid-column:1/-1">
      <h2>Timeline · последние волны</h2>
      ${(d.timeline || []).length ? d.timeline.map((t) => '<div class="task"><span class="src">' + esc(t.hash) + '</span><span>' + esc(t.subject) + '</span><span class="meta" style="margin-left:auto">' + esc(t.when) + '</span></div>').join('') : '<span class="empty">нет коммитов</span>'}
    </div>`;
}

async function exportGdoc() {
  const r = await (await fetch('/api/export?project=' + encodeURIComponent(current))).json();
  alert(r.message || ('snapshot: ' + r.path));
}

if (location.protocol === 'file:') notice(SERVER_HINT);
else loadProjects();
</script>
</body>
</html>
