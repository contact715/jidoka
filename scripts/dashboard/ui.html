<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>jidoka dashboard</title>
<style>
  :root { --bg:#0d0f13; --bg2:#13161c; --card:#171a21; --card2:#1c2029; --border:#262b36; --border2:#313845;
          --text:#e7eaf0; --muted:#8b93a5; --muted2:#5b6373; --green:#34d399; --amber:#fbbf24; --red:#f87171; --blue:#7dd3fc;
          --green-bg:rgba(52,211,153,.13); --amber-bg:rgba(251,191,36,.14); --red-bg:rgba(248,113,113,.14); --blue-bg:rgba(125,211,252,.1);
          --shadow:0 1px 3px rgba(0,0,0,.35); --radius:14px; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.55 -apple-system,system-ui,'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; }
  header { padding:13px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; flex-wrap:wrap; background:var(--bg2); position:sticky; top:0; z-index:10; }
  h1 { font-size:15px; margin:0; font-weight:650; letter-spacing:-.01em; }
  #projects { display:flex; gap:7px; flex-wrap:wrap; }
  .tab { padding:5px 13px; border:1px solid var(--border); border-radius:8px; cursor:pointer; color:var(--muted); font-size:13px; transition:all .15s; }
  .tab:hover { color:var(--text); border-color:var(--border2); }
  .tab.active { color:#15171c; border-color:var(--amber); background:var(--amber); font-weight:600; }
  .live { font-size:11px; color:var(--muted); }
  .live.on { color:var(--green); }
  button { background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 13px; cursor:pointer; font-size:13px; transition:all .15s; }
  button:hover { border-color:var(--border2); background:var(--card2); }
  main { padding:20px 22px; display:grid; gap:14px; grid-template-columns:repeat(3,1fr); max-width:1280px; margin:0 auto; }
  .full { grid-column:1/-1; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:17px; min-width:0; box-shadow:var(--shadow); }
  .card h2 { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin:0 0 13px; font-weight:600; }
  .badge { display:inline-block; padding:4px 11px; border-radius:7px; font-size:12px; font-weight:700; letter-spacing:.02em; }
  .badge.green { color:var(--green); background:var(--green-bg); }
  .badge.amber { color:var(--amber); background:var(--amber-bg); }
  .badge.red { color:var(--red); background:var(--red-bg); }
  .badge.unknown { color:var(--muted); background:rgba(139,147,165,.12); }
  .meta { font-size:12px; color:var(--muted); margin:4px 0; }
  .task { display:flex; gap:10px; padding:8px 0 8px 9px; border-bottom:1px solid var(--border); font-size:13px; align-items:baseline; }
  .task:last-child { border-bottom:0; }
  .task .src { font-size:9.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted2); min-width:106px; flex-shrink:0; }
  .p-critical { border-left:3px solid var(--red); }
  .p-high { border-left:3px solid var(--amber); }
  .p-medium { border-left:3px solid var(--muted2); }
  .p-low { border-left:3px solid var(--border2); }
  .empty { color:var(--muted2); font-size:13px; }
  .banner { grid-column:1/-1; padding:11px 16px; border-radius:12px; background:var(--red-bg); border:1px solid rgba(248,113,113,.3); color:var(--red); font-weight:600; }
  .notice { margin:34px auto; padding:20px 22px; border-radius:14px; background:var(--amber-bg); border:1px solid rgba(251,191,36,.3); color:var(--text); line-height:1.7; max-width:640px; }
  .notice code { background:rgba(255,255,255,.08); padding:2px 7px; border-radius:5px; font-size:13px; }
  .notice b { color:var(--amber); }
  .wave-head { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .tag { font-size:11px; padding:2px 10px; border-radius:20px; background:rgba(255,255,255,.06); color:var(--muted); white-space:nowrap; }
  .tag.live-tag { color:var(--green); background:var(--green-bg); }
  .tag.cur-tag { color:var(--amber); background:var(--amber-bg); font-weight:600; }
  .tag.halt-tag { color:var(--red); background:var(--red-bg); }
  .pipeline { display:flex; flex-direction:column; }
  .flow { color:var(--border2); margin-left:15px; font-size:14px; line-height:1; height:12px; }
  .stage { display:flex; gap:13px; align-items:flex-start; padding:12px 13px; border:1px solid var(--border); border-radius:11px; background:var(--bg2); transition:border-color .15s; }
  .stage.cur { border-color:var(--amber); background:var(--amber-bg); }
  .st-ico { width:24px; height:24px; min-width:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; margin-top:1px; }
  .st-done .st-ico { background:var(--green-bg); color:var(--green); }
  .st-running .st-ico { background:var(--amber-bg); color:var(--amber); animation:pulse 1.5s ease-in-out infinite; }
  .st-failed .st-ico { background:var(--red-bg); color:var(--red); }
  .st-pending .st-ico, .st-idle .st-ico { background:rgba(139,147,165,.1); color:var(--muted2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .st-main { flex:1; min-width:0; }
  .st-top { display:flex; gap:7px; align-items:center; flex-wrap:wrap; font-size:13.5px; }
  .st-top b { font-weight:600; }
  .chips { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
  .chip { font-size:11px; padding:3px 9px; border-radius:7px; background:rgba(255,255,255,.05); color:var(--text); }
  .chip.oc-violation, .chip.oc-fail, .chip.oc-block, .chip.oc-revise, .chip.oc-deadlock, .chip.oc-halted { background:var(--red-bg); color:var(--red); }
  .chip.oc-pass, .chip.oc-approve, .chip.oc-done { background:var(--green-bg); color:var(--green); }
  .gates { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
  .gate { font-size:10px; padding:2px 7px; border-radius:5px; background:var(--blue-bg); color:var(--blue); font-family:ui-monospace,Menlo,monospace; }
  .st-note { font-size:12px; color:var(--muted); margin-top:7px; font-style:italic; }
  .st-stat { font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted2); min-width:54px; text-align:right; margin-top:4px; font-weight:600; }
  /* horizontal pipeline board — stage columns left→right, wave cards inside */
  .board { display:flex; gap:11px; overflow-x:auto; padding-bottom:10px; align-items:stretch; -webkit-overflow-scrolling:touch; }
  .col { flex:0 0 166px; min-width:166px; background:var(--bg2); border:1px solid var(--border); border-radius:12px; display:flex; flex-direction:column; }
  .col.has-wave { border-color:var(--border2); }
  .col-h { font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); padding:10px 11px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; }
  .col-n { background:var(--amber-bg); color:var(--amber); border-radius:10px; padding:0 7px; font-size:11px; font-weight:700; margin-left:auto; }
  .col-body { padding:9px; display:flex; flex-direction:column; gap:9px; flex:1; min-height:38px; }
  .col-empty { color:var(--border2); text-align:center; padding:13px 0; font-size:15px; opacity:.5; }
  .wcard { background:var(--card2); border:1px solid var(--border2); border-left:3px solid var(--border2); border-radius:8px; padding:8px 9px; cursor:pointer; transition:all .15s; }
  .wcard:hover { border-color:var(--muted2); transform:translateY(-1px); box-shadow:var(--shadow); }
  .wcard.sel { border-color:var(--amber); background:var(--amber-bg); }
  .wcard.crit { border-left-color:var(--red); }
  .wcard.live { border-left-color:var(--green); }
  .wcard.done { padding:6px 9px; border-left-color:var(--green); }
  .wcard.done .wcard-name { font-weight:500; color:var(--muted); }
  .wcard-hd { display:flex; justify-content:space-between; gap:7px; align-items:baseline; }
  .wcard-name { font-size:11.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  .wcard-p { font-size:10px; color:var(--muted); flex-shrink:0; }
  .bar { height:5px; border-radius:3px; background:rgba(255,255,255,.07); overflow:hidden; margin-top:7px; }
  .bar span { display:block; height:100%; border-radius:3px; background:linear-gradient(90deg,#34d399,#5eead4); transition:width .4s ease; }
  @media (max-width:980px) { main { grid-template-columns:1fr 1fr; } }
  @media (max-width:720px) { main { grid-template-columns:1fr; padding:14px; gap:12px; } .col { flex-basis:150px; min-width:150px; } }
  @media (max-width:560px) { header { padding:10px 14px; gap:8px; } h1 { font-size:14px; } .stage { flex-wrap:wrap; } }
</style>
</head>
<body>
<header>
  <h1>🦞 jidoka dashboard</h1>
  <div id="projects"></div>
  <span class="live" id="live">○ idle</span>
  <button onclick="exportGdoc()" style="margin-left:auto">Export → GDoc</button>
</header>
<main id="main"><p class="empty" style="padding:20px">Загрузка…</p></main>

<script>
let current = null, es = null, selectedWave = null, lastData = null;

function notice(html) { document.getElementById('main').innerHTML = '<div class="notice">' + html + '</div>'; }
const SERVER_HINT = '⚠ <b>Дашборд не подключён к серверу.</b><br>Запусти <code>npm run dashboard</code> в папке jidoka, затем открой <b>http://localhost:7717</b>.<br><span style="color:var(--muted)">Сам файл <code>ui.html</code> (preview / file://) не работает — данные берутся у сервера.</span>';

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(path + ' → HTTP ' + r.status);
  return r.json();
}

async function loadProjects() {
  let ps;
  try { ps = await api('/api/projects'); }
  catch { notice(SERVER_HINT); return; }
  if (!ps.length) { notice('Проекты не найдены. Дашборд ищет <code>~/*/.jidoka</code> и <code>docs/governance/raci.json</code>.'); return; }
  const el = document.getElementById('projects');
  el.innerHTML = '';
  ps.forEach((p) => {
    const t = document.createElement('div');
    t.className = 'tab' + (p.name === current ? ' active' : '');
    t.textContent = p.name + (p.kind === 'framework' ? ' ⚙' : '');
    t.onclick = () => select(p.name);
    el.appendChild(t);
  });
  if (!current && ps.length) select(ps[0].name);
}

function select(name) {
  current = name; selectedWave = null;
  loadProjects();
  render();
  if (es) es.close();
  es = new EventSource('/api/stream?project=' + encodeURIComponent(name));
  es.onopen = () => { const l = document.getElementById('live'); l.textContent = '● live'; l.className = 'live on'; };
  es.addEventListener('update', render);
  es.onerror = () => { const l = document.getElementById('live'); l.textContent = '○ reconnecting'; l.className = 'live'; };
}

function esc(s) { return String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

const ICON = { done: '✓', running: '▸', failed: '✗', pending: '○', idle: '◦' };

function stageHtml(s) {
  return `
    <div class="stage st-${s.status}${s.current ? ' cur' : ''}">
      <div class="st-ico">${ICON[s.status] || '○'}</div>
      <div class="st-main">
        <div class="st-top"><b>${esc(s.label)}</b>${s.parallel ? '<span class="tag">∥ parallel</span>' : ''}${s.verifyN ? `<span class="tag">verify ×${s.verifyN}</span>` : ''}${s.current ? '<span class="tag cur-tag">● волна здесь</span>' : ''}</div>
        ${s.agents.length ? `<div class="chips">${s.agents.map((a) => `<span class="chip${a.outcome ? ' oc-' + esc(String(a.outcome).toLowerCase()) : ''}">${esc(a.name)}${a.outcome ? ' · ' + esc(a.outcome) : ''}</span>`).join('')}</div>` : ''}
        ${s.gates.length ? `<div class="gates">${s.gates.map((g) => `<span class="gate">${esc(g)}</span>`).join('')}</div>` : ''}
        ${s.note ? `<div class="st-note">“${esc(s.note)}”</div>` : ''}
      </div>
      <div class="st-stat">${esc(s.status)}</div>
    </div>`;
}

// the horizontal pipeline board: stage columns left→right, wave cards placed by current phase
function boardHtml(d) {
  const cols = (d.board && d.board.columns) || [];
  return '<div class="board">' + cols.map((c) => `
    <div class="col${c.waves.length ? ' has-wave' : ''}">
      <div class="col-h">${esc(c.label)}${c.waves.length ? `<span class="col-n">${c.waves.length}</span>` : ''}</div>
      <div class="col-body">
        ${c.waves.length ? c.waves.map((w) => w.progress >= 100
          ? `<div class="wcard done${w.wave === selectedWave ? ' sel' : ''}" onclick="selectWave('${esc(w.wave)}')" title="${esc(w.wave)} · shipped 100%"><span class="wcard-name">✓ ${esc(w.wave)}</span></div>`
          : `<div class="wcard${w.wave === selectedWave ? ' sel' : ''}${w.risk === 'critical' ? ' crit' : w.live ? ' live' : ''}" onclick="selectWave('${esc(w.wave)}')" title="${esc(w.wave)} · ${esc(w.risk)}${w.live ? ' · live' : ''} · ${w.progress}% фаз done">
            <div class="wcard-hd"><span class="wcard-name">${esc(w.wave)}</span><span class="wcard-p">${w.progress}%</span></div>
            <div class="bar"><span style="width:${w.progress}%"></span></div>
          </div>`).join('') : '<div class="col-empty">—</div>'}
      </div>
    </div>`).join('') + '</div>';
}

function selectWave(name) { selectedWave = name; if (lastData) paint(lastData); }

async function render() {
  if (!current) return;
  let d;
  try { d = await api('/api/data?project=' + encodeURIComponent(current)); }
  catch { notice(SERVER_HINT); return; }
  lastData = d;
  if (!selectedWave || !(d.waves || []).some((w) => w.wave === selectedWave)) selectedWave = (d.pipeline && d.pipeline.wave) || (d.waves && d.waves[0] && d.waves[0].wave) || null;
  paint(d);
}

function paint(d) {
  const h = d.health;
  const banner = h.halt ? '<div class="banner">🔴 ANDON — pipeline halted, resume required</div>' : '';
  const sel = (d.waves || []).find((w) => w.wave === selectedWave) || d.pipeline;
  const detailTags = [
    sel.wave ? `<span class="tag">${esc(sel.wave)}</span>` : '<span class="tag">канонический граф</span>',
    sel.task ? `<span class="tag">${esc(sel.task.risk || 'normal')}${(sel.task.surfaces || []).length ? ' · ' + esc((sel.task.surfaces || []).join('+')) : ''}</span>` : '',
    `<span class="tag ${sel.live ? 'live-tag' : ''}">${sel.live ? '● live' : 'canonical'}</span>`,
    `<span class="tag">${sel.progress}% phases done</span>`,
  ].filter(Boolean).join('');
  const detailBody = sel.stages.length ? sel.stages.map(stageHtml).join('<div class="flow">│</div>') : '<span class="empty">нет стадий</span>';
  const hint = (d.board && d.board.waveCount) ? '' : '<p class="meta" style="margin:8px 2px 0">Нет журналируемых волн в этом проекте — карточки появятся, когда волна пишет run-state. Колонки = канонические стадии пайплана.</p>';
  const tasks = d.tasks.length
    ? d.tasks.map((t) => '<div class="task p-' + t.priority + '"><span class="src">' + esc(t.source) + '</span><span>' + esc(t.text) + '</span></div>').join('')
    : '<span class="empty">всё чисто</span>';
  document.getElementById('main').innerHTML = `
    ${banner}
    <div class="card full">
      <h2>Pipeline · ${esc((d.pipeline && d.pipeline.branch) || '')} · ${(d.board && d.board.waveCount) || 0} волн(ы) в потоке</h2>
      ${boardHtml(d)}
      ${hint}
    </div>
    <div class="card full">
      <h2>Детали волны&nbsp;&nbsp;<span style="text-transform:none;letter-spacing:0">${detailTags}</span></h2>
      <div class="pipeline">${detailBody}</div>
    </div>
    <div class="card">
      <h2>Health</h2>
      <span class="badge ${h.level}">${h.level.toUpperCase()}</span>
      <p class="meta">eval ${h.evalPct ?? '—'}% · recent fails ${h.recentFails} · ${h.halt ? 'HALTED' : 'running'}</p>
      <h2 style="margin-top:18px">Production</h2>
      <p class="meta">${d.production.deployCount} deploy event(s)</p>
      <p class="meta">updated ${new Date(d.collectedAt).toLocaleTimeString()}</p>
    </div>
    <div class="card">
      <h2>Лента действий агентов</h2>
      ${(d.activity || []).length ? d.activity.map((a) => '<div class="task"><span class="src">' + esc(a.agent) + '</span><span class="chip' + (a.action ? ' oc-' + esc(String(a.action).toLowerCase()) : '') + '">' + esc(a.action) + '</span>' + (a.label ? '<span class="meta" style="margin-left:auto">' + esc(a.label) + '</span>' : '') + '</div>').join('') : '<span class="empty">тихо</span>'}
    </div>
    <div class="card">
      <h2>Уроки мета-леджера · рецидив</h2>
      ${(d.lessons || []).length ? d.lessons.map((l) => '<div class="task"><span class="src">' + l.count + '×</span><span>' + esc(l.class) + '</span></div>').join('') : '<span class="empty">нет</span>'}
    </div>
    <div class="card full">
      <h2>Что висит · ${d.tasks.length}</h2>
      ${tasks}
    </div>
    <div class="card full">
      <h2>Timeline · последние волны</h2>
      ${(d.timeline || []).length ? d.timeline.map((t) => '<div class="task"><span class="src">' + esc(t.hash) + '</span><span>' + esc(t.subject) + '</span><span class="meta" style="margin-left:auto">' + esc(t.when) + '</span></div>').join('') : '<span class="empty">нет коммитов</span>'}
    </div>`;
}

async function exportGdoc() {
  const r = await (await fetch('/api/export?project=' + encodeURIComponent(current))).json();
  alert(r.message || ('snapshot: ' + r.path));
}

if (location.protocol === 'file:') notice(SERVER_HINT);
else loadProjects();
</script>
</body>
</html>
