\* TLC model-check configuration for AndonHalt.tla
\* Wave-138 — Formal Model Checking (TLA+)
\*
\* Run with:
\*   java -cp tools/tla/tla2tools.jar tlc2.TLC -config docs/formal/AndonHalt.cfg docs/formal/AndonHalt.tla
\*
\* State-space bound: MaxQueue=2, Agents={"agent1","agent2"}
\* This keeps the state space finite and tractable for TLC exploration.

SPECIFICATION Spec

\* ── Constants ────────────────────────────────────────────────────────────────
CONSTANTS
  MaxQueue = 2
  Agents   = {"agent1", "agent2"}
  NULL     = "NULL"

\* ── State Constraint (bound queue length for TLC) ────────────────────────────
\* Prevents unbounded state-space explosion. The real queue is unbounded
\* but the safety properties hold for all queue lengths; checking up to
\* MaxQueue=2 is sufficient to find invariant violations.
CONSTRAINT
  Len(queue) <= MaxQueue

\* ── Safety Invariants ────────────────────────────────────────────────────────
\* Both must hold in EVERY reachable state.
\*
\* NoAutoResume: active clears only via Resume (human-approved) or
\*   ForceResume (named escape hatch, andon-resume.mjs:147-162).
\*   ForceResume is NOT a violation — it is the auditable escape hatch.
\*
\* ExitBlocksWhenEnabled: while active!=NULL and enabled=TRUE, pipeline
\*   is in a blocking state (exit-42 fires in run-verification-pipeline.mjs:75-81).
\*   Soft-mode (enabled=FALSE) is the named bypass — not a violation.
INVARIANTS
  TypeOK
  NoAutoResume
  ExitBlocksWhenEnabled

\* ── Liveness Property ────────────────────────────────────────────────────────
\* AlwaysEventuallyResumable: a halted machine can always eventually reach
\* RUNNING. Requires weak fairness on Resume, ResumeWithQueue, ForceResume
\* (encoded in the Spec fairness clause). If TLC reports a liveness violation,
\* it means a reachable state exists from which no Resume or ForceResume
\* can ever fire — a deadlock in the human-gated resume path.
PROPERTIES
  AlwaysEventuallyResumable
