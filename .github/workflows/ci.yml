# CI — runs the framework's own gates automatically on every push and PR.
#
# This file closes the #1 gap the holistic audit found: the gates existed but were
# only triggered by a local pre-push hook, while docs referenced a .github/workflows
# CI that did not exist. Every step below is a gate that is GREEN on a clean checkout
# (verified before this file was written) — no step references an unseeded object, so
# this CI is real, not a ghost. instantiation-audit runs in --warn (soft) until the
# known registry ghosts are filled, then the flag is dropped to make it block.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history: pre-publish-guard scans git log -p, meta-audit reads the ledger

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      # ── Meta-Mistake Engine ────────────────────────────────────────────────
      # meta-audit is ADVISORY here, matching the framework's own local pre-push policy
      # ("↑ meta-audit: recurring class(es) flagged — informational, not blocking"). It has no
      # decay window, so a single historical regression would otherwise red main forever. It still
      # runs and surfaces process debt as a CI ::warning::; meta-honesty (ledger quality) stays HARD.
      - name: meta-audit (recurrence / regression — advisory, matches local pre-push policy)
        run: node scripts/meta-audit.mjs || echo "::warning::meta-audit flagged unresolved process debt (advisory, non-blocking — see log above)"
      - name: meta-honesty (ledger signal quality)
        run: node scripts/meta-honesty.mjs
      # HARD schema gate (2026-W28-G3): every ledger row must carry the full mistake schema
      # (date/class/claimed/real/caught_by). Catches direct-append side channels that bypass
      # meta-log — the exact path of the 2026-06-06 ledger-pollution incidents.
      - name: ledger-schema-gate (ledger rows must carry the full mistake schema)
        run: npm run gate:ledger-schema
      # ledger-pollution regression (2026-07-04): a judge-calibration/debias run streams
      # position-sensitivity telemetry — it must land in its sidecar, NEVER in the mistake ledger.
      # Prove it: run the debias-writing self-tests, assert the ledger is byte-unchanged, then that
      # meta-honesty still passes. A regression here means telemetry leaked back into meta-mistakes.jsonl.
      - name: ledger-pollution regression (debias telemetry must not touch the mistake ledger)
        run: |
          node scripts/judge-panel.mjs --self-test >/dev/null
          node scripts/debate-engine.mjs --self-test >/dev/null
          git diff --exit-code docs/audits/meta-mistakes.jsonl
          node scripts/meta-honesty.mjs

      # ── Engine unit tests (zero-dep node:test — runs without npm install) ───
      - name: engine unit tests
        run: npm run test:engine
      - name: agent eval suite (deterministic fitness signal — regression-gated)
        run: npm run eval
      - name: selftest-reality (blocks self-tests that exit 0 without asserting)
        run: npm run gate:selftest

      # ── Structural / security / privacy gates ──────────────────────────────
      - name: structural decomposition gate
        run: npm run check:structural
      - name: security pattern gate
        run: npm run check:security
      - name: dependency-audit (supply-chain — block high/critical vulns)
        run: node scripts/dependency-audit.mjs
      - name: pre-publish privacy guard (tree + history)
        run: node scripts/pre-publish-guard.mjs

      # ── Instantiation gate — HARD (all known ghosts closed this session; now blocks any new one) ──
      - name: instantiation-audit (does scaffolding point at real objects?)
        run: node scripts/instantiation-audit.mjs

      # ── Spec-tree structural gates ─────────────────────────────────────────
      # The five-level spec hierarchy must stay consistent: lineage edges valid,
      # RACI complete, and no NEW broken refs / orphans / missing-meta (ratchet).
      - name: spec lineage graph (regenerate — fails CI if it cannot build)
        run: node scripts/build-lineage-graph.mjs --json
      - name: RACI governance validator (one human-accountable seat per activity)
        run: node scripts/validate-raci.mjs
      - name: cascade-validate (L0 → children compatibility)
        run: node scripts/cascade-validate.mjs --root docs/CONSTITUTION.md --level L1
      - name: spec coverage report (module inventory)
        run: node scripts/regenerate-coverage-report.mjs --dry
      - name: spec-structural-gate (RATCHET — blocks NEW broken refs / orphans / missing-meta)
        run: node scripts/spec-structural-gate.mjs
      - name: spec-drift-check self-test
        run: node scripts/spec-drift-check.mjs --self-test
      - name: spec-structural-gate self-test
        run: node scripts/spec-structural-gate.mjs --self-test
      - name: ac-verify-map self-test
        run: node scripts/ac-verify-map.mjs --self-test
      - name: AC-as-tests (execute every L3 self/engine acceptance check)
        run: node scripts/ac-verify-map.mjs --run --strict

      # ── 2026-W27 enrichment mechanisms: run each new self-test in CI (not dead tests) ──
      - name: reasoning-bank self-test (contrast-signal capture)
        run: node scripts/test-reasoning-bank.mjs
      - name: dag-schedule self-test (dependency DAG + critical path)
        run: node scripts/dag-schedule.mjs --self-test
      - name: standards-mine self-test (de-facto convention mining)
        run: node scripts/standards-mine.mjs --self-test
      - name: memory-vector self-test (RRF fusion + honest DORMANT)
        run: node scripts/memory-vector.mjs --self-test
      - name: memory-guard self-test (write-time author != judge + dedup)
        run: node scripts/memory-guard.mjs --self-test
      - name: reasoning-distill self-test (contrast -> gated strategy records)
        run: node scripts/reasoning-distill.mjs --self-test
      - name: sleep-consolidate self-test (between-wave consolidation plan)
        run: node scripts/sleep-consolidate.mjs --self-test
      - name: clarify-question-quality self-test (interviewer-error + Grice rubric)
        run: node scripts/clarify-question-quality.mjs --self-test
      - name: judge-calibration-state self-test (honest per-judge calibration marker)
        run: node scripts/judge-calibration-state.mjs --self-test
      - name: judge-calibration-state report (regenerate the marker, dry)
        run: node scripts/judge-calibration-state.mjs --dry

      # ── Kaizen engine (autonomous weekly self-improvement machinery) ──
      - name: kaizen-ledger self-test (outcome memory)
        run: node scripts/kaizen-ledger.mjs --self-test
      - name: kaizen-audit self-test (deterministic shipped/open/regressed)
        run: node scripts/kaizen-audit.mjs --self-test
      - name: kaizen-scorecard self-test (analytics + trend)
        run: node scripts/kaizen-scorecard.mjs --self-test
      - name: kaizen-critique self-test (completeness gate)
        run: node scripts/kaizen-critique.mjs --self-test
      - name: kaizen-rank self-test (ROI ranking + REGRESSING auto-prioritise)
        run: node scripts/kaizen-rank.mjs --self-test
      - name: kaizen-engine self-test (orchestration + dashboard, anti-ghost)
        run: node scripts/kaizen-engine.mjs --self-test

      # ── Gate self-checks: verification-by-execution + the gate map (catches a ghost gate) ──
      - name: execution-gate self-test
        run: node scripts/execution-gate.mjs --self-test
      - name: gate-audit (every CI-layer gate really runs in a workflow)
        run: node scripts/gate-audit.mjs

      # ── Red team: self-attack the gates on every push (deterministic catalog, ~zero cost) ──
      - name: red-team (try to break our own gates; a miss is a vulnerability)
        run: node scripts/red-team.mjs
