# agent-regression — runs the eval harness against the framework's own agents.
# docs/archive/imported-product/AGENTIC_ENGINEERING_TZ_V2.md referenced this workflow; it now exists. run-evals
# honest-skips (DORMANT, exit 0) until docs/evals/<agent>/golden-cases.jsonl is seeded,
# so this is green today and becomes a real regression gate the moment datasets land.
name: agent-regression

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 8 * * 1' # weekly, Monday 08:00 UTC

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: agent eval regression
        run: node scripts/run-evals.mjs
