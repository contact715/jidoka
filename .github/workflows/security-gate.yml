# Security gate — real SAST (semgrep) + secret scan (trufflehog) on every push/PR.
#
# WHY THIS EXISTS: check-security-patterns.sh runs grep-pattern checks and surfaces a SKIP for
# semgrep when the binary is absent locally, pointing here ("CI gate security-gate.yml handles it").
# Until this file existed that reference was a ghost — SAST ran nowhere. Now it is real: semgrep
# (OSS rulesets, no token needed) + trufflehog run in CI and fail the build on findings.
name: security-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: install semgrep
        run: pip install semgrep
      - name: semgrep SAST (OWASP + typescript + react + secrets)
        # OSS registry rulesets, no SEMGREP_APP_TOKEN required. --error fails the build on findings.
        run: |
          semgrep scan \
            --config p/owasp-top-ten --config p/typescript --config p/react --config p/secrets \
            --exclude node_modules --exclude .next --error --quiet || {
              echo "::error::semgrep found high/critical findings — fix before merge.";
              exit 1;
            }

  trufflehog-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history: scan every commit for leaked secrets
      - name: trufflehog secret scan (full history, verified only)
        # Binary full-history scan instead of the action's diff mode: the action exits with
        # "If BASE == HEAD" on a new-branch push / PR merge-ref (degenerate range) — a FALSE
        # failure, not a leak (confirmed: pre-publish-guard + semgrep clean). Scanning the whole
        # local git history has no range to compute (robust) and is more thorough. --only-verified
        # means only live/verified secrets fail the build (test fixtures never false-trip it).
        run: |
          # pin the installer to a release tag (not main) and split the curl|sh pipe:
          # download the script to a file, then execute it — no piping remote content into a shell.
          curl -sSfL "https://raw.githubusercontent.com/trufflesecurity/trufflehog/v3.95.7/scripts/install.sh" -o "$RUNNER_TEMP/tfh-install.sh"
          sh "$RUNNER_TEMP/tfh-install.sh" -b "$RUNNER_TEMP/tfh" v3.95.7
          "$RUNNER_TEMP/tfh/trufflehog" git "file://$PWD" --only-verified --fail
